name: CatVox
options:
  bundleIdPrefix: com.kathelix
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  xcodeVersion: "16"

targets:
  CatVox:
    type: application
    platform: iOS
    sources:
      - CatVox
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.kathelix.catvox
        DEVELOPMENT_TEAM: 93SH436384
        SWIFT_VERSION: "5.0"
        TARGETED_DEVICE_FAMILY: "1"
        IPHONEOS_DEPLOYMENT_TARGET: "17.0"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        DEVELOPMENT_ASSET_PATHS: '"CatVox/Preview Content"'
    info:
      path: CatVox/Info.plist
      properties:
        CFBundleDisplayName: CatVox
        UILaunchScreen:
          UIColorName: ""
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UIUserInterfaceStyle: Dark
        NSCameraUsageDescription: "CatVox records 10-second clips to analyse your cat's behaviour."
        NSMicrophoneUsageDescription: "CatVox captures audio to analyse your cat's vocalisations."
        NSPhotoLibraryAddUsageDescription: "CatVox saves rendered share videos to your Photos library when you ask it to."

  CatVoxTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - CatVoxTests
    dependencies:
      - target: CatVox
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.kathelix.catvox.tests
        SWIFT_VERSION: "5.0"
        IPHONEOS_DEPLOYMENT_TARGET: "17.0"
        TARGETED_DEVICE_FAMILY: "1"
        GENERATE_INFOPLIST_FILE: YES

schemes:
  CatVox:
    build:
      targets:
        CatVox: all
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - CatVoxTests
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
