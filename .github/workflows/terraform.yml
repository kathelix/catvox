name: Terraform

on:
  push:
    branches: [main]
    paths:
      - 'terraform/**'
      - '.github/workflows/terraform.yml'
  pull_request:
    branches: [main]
    paths:
      - 'terraform/**'
      - '.github/workflows/terraform.yml'

# Cancel any in-progress run for the same branch so each push doesn't queue
# behind the previous one. Separate group from the iOS build workflow.
concurrency:
  group: terraform-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  id-token: write       # Required for Workload Identity Federation token exchange
  pull-requests: write  # Required to post plan output as a PR comment

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
  # Passed to Terraform as var.project_id and var.app_check_debug_token.
  # TF_VAR_* prefix is picked up automatically — no extra wiring needed.
  TF_VAR_project_id: ${{ secrets.GCP_PROJECT_ID }}
  TF_VAR_app_check_debug_token: ${{ secrets.TF_VAR_app_check_debug_token }}
  TF_VAR_alert_email: ${{ secrets.TF_VAR_ALERT_EMAIL }}

jobs:
  # ── Plan ────────────────────────────────────────────────────────────────────
  # Runs on every PR targeting main. Authenticates to GCP via WIF, runs
  # terraform plan, and posts the result as a PR comment.
  plan:
    name: Plan
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    defaults:
      run:
        working-directory: terraform

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to GCP (Workload Identity Federation)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3

      # Check formatting before doing anything else — fast fail.
      - name: Terraform Format Check
        id: fmt
        run: terraform fmt -check -recursive
        continue-on-error: true  # Report in PR comment rather than failing the step

      - name: Terraform Init
        id: init
        run: terraform init

      - name: Terraform Validate
        id: validate
        run: terraform validate -no-color

      - name: Terraform Plan
        id: plan
        run: terraform plan -no-color
        continue-on-error: true  # Failure is surfaced in the PR comment below

      # Post a structured comment summarising all steps. Truncates plan output
      # if it exceeds GitHub's 65 535-character comment limit.
      - name: Post plan to PR
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fmt      = '${{ steps.fmt.outcome }}';
            const init     = '${{ steps.init.outcome }}';
            const validate = `${{ steps.validate.outputs.stdout }}`;
            const plan     = `${{ steps.plan.outputs.stdout }}`;
            const outcome  = '${{ steps.plan.outcome }}';

            const MAX = 60000;
            const planBody = plan.length > MAX
              ? plan.slice(0, MAX) + '\n\n⚠️ Output truncated — see full logs in Actions.'
              : plan;

            const body = [
              '## Terraform Plan — `' + outcome + '`',
              '',
              '| Step | Result |',
              '|---|---|',
              '| Format  | `' + fmt + '` |',
              '| Init    | `' + init + '` |',
              '',
              '**Validate**',
              '```',
              validate,
              '```',
              '',
              '<details><summary>Show Plan</summary>',
              '',
              '```terraform',
              planBody,
              '```',
              '',
              '</details>',
              '',
              `*Triggered by @${context.actor} · \`${context.eventName}\`*`,
            ].join('\n');

            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body,
            });

            if (outcome === 'failure') {
              core.setFailed('Terraform plan failed — see PR comment for details.');
            }

  # ── Apply ────────────────────────────────────────────────────────────────────
  # Runs only when a commit lands on main (i.e. PR is merged). Re-authenticates
  # via WIF and applies the plan with -auto-approve.
  apply:
    name: Apply
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    defaults:
      run:
        working-directory: terraform

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to GCP (Workload Identity Federation)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: terraform init

      - name: Terraform Apply
        run: terraform apply -auto-approve -no-color
