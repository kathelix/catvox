name: Functions

on:
  push:
    branches: [main]
    paths:
      - 'functions/**'
      - 'firebase.json'
      - 'docs/systemInstruction.md'
      - '.github/workflows/functions.yml'
  pull_request:
    branches: [main]
    paths:
      - 'functions/**'
      - 'firebase.json'
      - 'docs/systemInstruction.md'
      - '.github/workflows/functions.yml'

concurrency:
  group: functions-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  id-token: write  # Required for Workload Identity Federation token exchange

jobs:
  # ── Build ────────────────────────────────────────────────────────────────────
  # Runs on every push and PR. Catches TypeScript compile errors early.
  build:
    name: Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: functions

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: functions/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

  # ── Deploy ───────────────────────────────────────────────────────────────────
  # Runs only on merge to main. Authenticates via WIF and deploys to GCP.
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    defaults:
      run:
        working-directory: functions

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Authenticate to GCP (Workload Identity Federation)
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: functions/package-lock.json

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Deploy to Firebase
        run: firebase deploy --only functions --project ${{ secrets.GCP_PROJECT_ID }}
